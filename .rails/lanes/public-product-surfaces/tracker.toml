schema_version = "1.0"

id = "public-product-surfaces"
name = "public product surfaces"
status = "proposed"
owner = "release/public-surface"
created = "2026-05-21"

objective = """
Keep every public first-contact surface aligned to one trust-boundary message:
unsafe-review is static unsafe exposure analysis for Rust PRs, advisory by default,
and not a proof of memory safety, UB freedom, or witness execution.
"""

scope = [
  "crates.io package metadata and packaged assets",
  "docs.rs landing/readme text",
  "CLI --help and first-contact command wording",
  "repo README/tagline/badge wording",
  "release-surface drift checks",
]

non_goals = [
  "enable default blocking policy",
  "claim UB-free or Miri-clean guarantees",
  "introduce witness execution by default",
]

proof_commands = [
  "cargo run --locked -p xtask -- check-public-surfaces",
  "cargo package -p unsafe-review --list",
  "cargo run --locked -p unsafe-review -- --help",
  "cargo run --locked -p xtask -- check-pr",
  "cargo run --locked -p xtask -- source-divergence",
  "git diff --check",
]

linked_plan = ".rails/lanes/public-product-surfaces/implementation-plan.md"
linked_closeout = ".rails/lanes/public-product-surfaces/closeout.md"
