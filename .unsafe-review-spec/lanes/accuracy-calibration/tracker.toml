schema_version = "1.0"

id = "accuracy-calibration"
name = "Accuracy validation and calibration"
status = "active"
owner = "calibration"

objective = """
Build a claim-scoped calibration system for unsafe-review ReviewCards so fixture,
dogfood, and labeled real-world evidence can justify precise support-tier claims
without overclaiming memory safety, UB-free status, Miri-clean status, or policy
readiness.
"""

end_state = [
  "Every calibrated claim is linked to fixtures, dogfood targets, labeled samples, and a checked metric report.",
  "Support-tier promotion requires an explicit calibration report and known-limits text.",
  "False-positive controls and false-negative probes are first-class dataset entries.",
  "No global precision/recall claim is possible without a scoped labeled denominator.",
  "Policy readiness remains deferred until calibrated claim gates are met.",
]

[[work_item]]
id = "accuracy-spec-and-policy"
status = "ready"
spec = "UNSAFE-REVIEW-SPEC-0026"
plan = ".unsafe-review-spec/lanes/accuracy-calibration/implementation-plan.md"
commands = [
  "cargo run --locked -p xtask -- check-calibration",
  "cargo run --locked -p xtask -- check-doc-artifacts",
  "cargo run --locked -p xtask -- check-goals",
  "cargo run --locked -p xtask -- check-pr",
  "git diff --check",
]
