schema_version = "1.0"

id = "marketplace-first-hour-ux"
name = "marketplace and first-hour UX"
status = "active"
owner = "product / cli"
created = "2026-05-23"

objective = """
Move unsafe-review from "published on crates.io" to "a Rust maintainer can
install it, wire it into their PRs, see value, and optionally use it in an
editor" — without weakening the advisory ReviewCard trust boundary.
"""

scope = [
  "first-hour CLI user path (install, doctor, first-pr, explain, support)",
  "copy-paste GitHub Actions integration for PR review",
  "advisory PR job-summary fragment derived from pr-summary.md",
  "comment-plan reviewer-actionability metadata polish",
  "VS Code / Open VSX read-only editor extension MVP over saved lsp.json",
  "marketplace publication preparation and manual publish workflow",
  "advisory Codecov telemetry once a successful upload exists",
]

non_goals = [
  "automatic PR comment posting by default",
  "default blocking on unsafe-review findings",
  "source-editing quick fixes",
  "default witness execution (Miri, cargo-careful, Loom, Kani, sanitizers)",
  "live LSP wiring in the MVP extension (deferred to SPEC-0018 hardening)",
  "automatic crate or extension publication on PR merge",
  "safety, UB-free, Miri-clean, site-execution, or calibrated precision claims",
]

proof_commands = [
  "cargo run --locked -p xtask -- check-pr",
  "cargo run --locked -p xtask -- check-docs",
  "cargo run --locked -p xtask -- check-doc-artifacts",
  "cargo run --locked -p xtask -- check-goals",
  "cargo run --locked -p xtask -- check-ci-lanes",
  "cargo run --locked -p xtask -- check-first-pr-artifacts target/unsafe-review",
  "cargo run --locked -p xtask -- source-divergence",
  "git diff --check",
]

linked_plan = ".unsafe-review-spec/lanes/marketplace-first-hour-ux/implementation-plan.md"
linked_closeout = ".unsafe-review-spec/lanes/marketplace-first-hour-ux/closeout.md"

