schema_version = "0.1"
status = "experimental"

required_core_fixtures = [
  "raw_pointer_alignment",
  "public_unsafe_fn_missing_safety",
  "maybeuninit_assume_init",
  "vec_set_len",
  "vec_set_len_initialized_loop",
  "vec_set_len_zero_clear",
  "transmute_invalid_value",
  "unsafe_impl_send",
  "ffi_sanitizer_route",
  "safe_code_no_cards",
  "imports_not_unsafe_operations",
  "cfg_target_feature_not_operation",
  "comment_alignment_not_guard",
]

[[cases]]
fixture = "raw_pointer_alignment"
kind = "positive"
claim = "raw pointer read with length evidence still reports missing alignment guard evidence"
support_tier = "Raw pointer card slice"
expected_cards = 1
expected_class = "guard_missing"
expected_operation_family = "raw_pointer_read"
expected_hazard = "alignment"

[[cases]]
fixture = "public_unsafe_fn_missing_safety"
kind = "positive"
claim = "public unsafe function without a # Safety contract reports contract_missing"
support_tier = "Contract evidence mining"
expected_cards = 1
expected_class = "contract_missing"

