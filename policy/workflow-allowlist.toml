schema_version = "0.1"
policy = "workflow-allowlist"
owner = "core/ci"

[[workflow]]
id = "workflow-0001"
path = ".github/workflows/ci.yml"
permissions = "contents: read"
actions = [
  "actions/checkout@v6",
  "dtolnay/rust-toolchain@1.95.0",
  "actions/upload-artifact@v7",
]
reason = "Routed swarm Rust workflow with a normalized result check and advisory unsafe-review artifact uploads. It uses self-hosted runners only for same-repo trusted PRs or workflow dispatch and falls back to GitHub-hosted runners."
created = "2026-05-18"
review_after = "2026-06-18"
