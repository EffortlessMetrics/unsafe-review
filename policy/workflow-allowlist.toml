schema_version = "0.1"
policy = "workflow-allowlist"
owner = "core/ci"

[[workflow]]
id = "workflow-0001"
path = ".github/workflows/ci.yml"
permissions = "contents: read, pull-requests: write"
actions = [
  "actions/checkout@v6",
  "dtolnay/rust-toolchain@1.95.0",
  "Swatinem/rust-cache@v2",
  "EffortlessMetrics/ub-review@4053bc0df7cd5918f8c6f80ceb3f714a572789d7",
]
reason = "Single tight CI gate, self-hosted-primary with GitHub-hosted overflow. A minimal route job (not a required check) reads org runner state via gh api orgs/EffortlessMetrics/actions/runners using the EM_RUNNER_READ_TOKEN secret (no external action; the API call uses a secret, not a uses: action) and picks the gate runner: an idle trusted self-hosted em-ci runner (matched on the shared self-hosted/linux/x64/em-ci/trusted-pr label set, any idle size, no per-size routing) when the owned fleet has capacity, else ubuntu-latest overflow for bursts, capacity gaps, missing-token, API failure, or fork PRs. The gate stays one job whose mandatory deterministic core floor (the full suite: cargo fmt --all --check, cargo clippy --workspace --all-targets --locked -- -D warnings, cargo test --workspace --locked, cargo run --locked -p xtask -- check-pr) is the only hard blocker and the only required status check (named 'Unsafe Review Rust Result' for branch protection), with runner-kind-aware disk/scratch handling (gh disk-free on overflow, bounded pre-guard GC of orphaned per-run scratch dirs + headroom report + shared-target reuse on self-hosted) and cargo target/dependency caching to reduce repeat CI runtime. The self-hosted branch executes a bounded find GC (mindepth 1 maxdepth 1, mmin +120, non-fatal) of /mnt/ci-scratch subdirs before reporting headroom, so orphaned dirs from cancelled runs self-heal on next PR traffic without touching worktrees, the repo checkout, or paths outside the scratch mount (mirrors ripr-swarm#1027, closes unsafe-review-swarm#1519). ub-review is pinned to an immutable commit SHA. The advisory EffortlessMetrics/ub-review action (SHA 4053bc0df7cd5918f8c6f80ceb3f714a572789d7, structured-ingestion: #363 routes by unsafe-review-gate.json schema instead of markdown scraping, #365 posts inline path:line review comments) rides along in the same job (continue-on-error, fail-on-gate false, posting review), reuses the warmed toolchain/cache (setup-rust false), and consumes the captured core-gate summary via pr-thread-context so its intelligent-ci LLM lanes review on top of the deterministic evidence. The advisory layer never fails the merge, is skipped on fork PRs that cannot read org secrets, and the only reason this workflow needs pull-requests: write is so ub-review can post its grouped advisory PR review. An advisory floor-time emit (no new uses: action; pure run: shell) records the core gate wall-time and run context into target/ci-core/floor-time.json and a step-summary line for ub-review cost-receipt composition (ub-review#336); the emit is wrapped in a non-fatal subshell and cannot change the gate verdict. No witness execution, source edits, or publishing."
created = "2026-05-18"
review_after = "2026-07-18"

