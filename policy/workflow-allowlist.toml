schema_version = "0.1"
policy = "workflow-allowlist"
owner = "core/ci"

[[workflow]]
id = "workflow-0001"
path = ".github/workflows/ci.yml"
permissions = "contents: read"
actions = [
  "actions/checkout@v6",
  "dtolnay/rust-toolchain@1.95.0",
  "dtolnay/rust-toolchain@v1",
  "Swatinem/rust-cache@v2",
]
reason = "Routed Rust Small workflow with CPX42/CX43/CX53 self-hosted lanes, explicit tiny GitHub-hosted fallback, capacity/config blocking, normalized result validation, and cargo target/dependency caching to reduce repeat CI runtime."
created = "2026-05-18"
review_after = "2026-06-18"

[[workflow]]
id = "workflow-0002"
path = ".github/workflows/unsafe-review.yml"
permissions = "contents: read"
actions = [
  "actions/checkout@v6",
  "dtolnay/rust-toolchain@1.95.0",
  "Swatinem/rust-cache@v2",
  "actions/upload-artifact@v7",
]
reason = "Advisory unsafe-review first-pr packet workflow. It uploads cards.json, pr-summary.md, cards.sarif, comment-plan.json, witness-plan.md, and lsp.json without witness execution, comment posting, source edits, or write permissions."
created = "2026-05-18"
review_after = "2026-06-18"

[[workflow]]
id = "workflow-0003"
path = ".github/workflows/policy-contracts.yml"
permissions = "contents: read"
actions = [
  "actions/checkout@v6",
]
reason = "Path-scoped source-of-truth scaffold workflow. It validates document, goal, package-boundary, and CI-lane ledgers when policy/spec/status/workflow/xtask rails change, without publishing, witness execution, source edits, or policy blocking."
created = "2026-05-20"
review_after = "2026-07-01"

[[workflow]]
id = "workflow-0004"
path = ".github/workflows/editor-extension.yml"
permissions = "contents: read"
actions = [
  "actions/checkout@v6",
  "actions/setup-node@v5",
  "actions/upload-artifact@v7",
]
reason = "Path-scoped editor extension packaging workflow. It installs npm dependencies, compiles TypeScript, runs unit tests, packages a VSIX for the read-only saved-lsp viewer, and uploads it as an artifact only for editor workflow/code changes, without publishing, witness execution, source edits, comment posting, or write permissions."
created = "2026-05-23"
review_after = "2026-07-23"

[[workflow]]
id = "workflow-0005"
path = ".github/workflows/editor-publish.yml"
permissions = "contents: read"
actions = [
  "actions/checkout@v6",
  "actions/setup-node@v5",
  "actions/upload-artifact@v7",
]
reason = "Manual editor extension publish workflow. workflow_dispatch only from main with dry_run default true; non-dry-run requires at least one explicit publish target and validated package identity; publication to VS Marketplace requires VSCE_PAT secret and explicit publish_to_vs_marketplace=true, publication to Open VSX requires OVSX_PAT secret and explicit publish_to_open_vsx=true. No witness execution, no source edits, no comment posting, no automatic publication on PR or push."
created = "2026-05-23"
review_after = "2026-07-23"

[[workflow]]
id = "workflow-0006"
path = ".github/workflows/coverage.yml"
permissions = "contents: read"
actions = [
  "actions/checkout@v6",
  "dtolnay/rust-toolchain@1.95.0",
  "Swatinem/rust-cache@v2",
  "codecov/codecov-action@v5",
  "actions/upload-artifact@v7",
]
reason = "Advisory cargo-llvm-cov + Codecov telemetry workflow. It uploads LCOV as execution-surface telemetry without threshold gating, without PR comment posting, without witness execution, without default branch-protection blocking, and without claiming memory safety, UB-free status, Miri-clean status, or site-execution proof."
created = "2026-05-23"
review_after = "2026-08-23"
