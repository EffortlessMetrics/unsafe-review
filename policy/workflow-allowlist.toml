schema_version = "0.1"
policy = "workflow-allowlist"
owner = "core/ci"

[[workflow]]
id = "workflow-0001"
path = ".github/workflows/ci.yml"
permissions = "contents: read, pull-requests: write"
actions = [
  "actions/checkout@v6",
  "dtolnay/rust-toolchain@1.95.0",
  "Swatinem/rust-cache@v2",
  "EffortlessMetrics/ub-review@e1e41124e0468b3714827fd32574c8c583803b72",
]
reason = "Single tight CI gate, self-hosted-primary with GitHub-hosted overflow. A minimal route job (not a required check) reads org runner state via gh api orgs/EffortlessMetrics/actions/runners using the EM_RUNNER_READ_TOKEN secret (no external action; the API call uses a secret, not a uses: action) and picks the gate runner: an idle trusted self-hosted em-ci runner (matched on the shared self-hosted/linux/x64/em-ci/trusted-pr label set, any idle size, no per-size routing) when the owned fleet has capacity, else ubuntu-latest overflow for bursts, capacity gaps, missing-token, API failure, or fork PRs. The gate stays one job whose mandatory deterministic core floor (the full suite: cargo fmt --all --check, cargo clippy --workspace --all-targets --locked -- -D warnings, cargo test --workspace --locked, cargo run --locked -p xtask -- check-pr) is the only hard blocker and the only required status check (named 'Unsafe Review Rust Result' for branch protection), with runner-kind-aware disk/scratch handling (gh disk-free on overflow, headroom report + shared-target reuse on self-hosted) and cargo target/dependency caching to reduce repeat CI runtime. ub-review is pinned to an immutable commit SHA. The advisory EffortlessMetrics/ub-review action rides along in the same job (continue-on-error, fail-on-gate false, posting review), reuses the warmed toolchain/cache (setup-rust false), and consumes the captured core-gate summary via pr-thread-context so its intelligent-ci LLM lanes review on top of the deterministic evidence. The advisory layer never fails the merge, is skipped on fork PRs that cannot read org secrets, and the only reason this workflow needs pull-requests: write is so ub-review can post its grouped advisory PR review. No witness execution, source edits, or publishing."
created = "2026-05-18"
review_after = "2026-07-18"

[[workflow]]
id = "workflow-0002"
path = ".github/workflows/unsafe-review.yml"
permissions = "contents: read"
actions = [
  "actions/checkout@v6",
  "dtolnay/rust-toolchain@1.95.0",
  "Swatinem/rust-cache@v2",
  "actions/upload-artifact@v7",
]
reason = "Advisory unsafe-review first-pr packet workflow, routed to the EM shared self-hosted rust-small tier behind the maintainer-applied full-ci label gate. It uploads the first-pr bundle, including ReviewCards, summaries, SARIF, comment-plan, witness-plan, receipt audit, manual-candidates, manual repair queue sidecar, saved LSP, and repair queue artifacts without witness execution, comment posting, source edits, or write permissions."
created = "2026-05-18"
review_after = "2026-06-18"

[[workflow]]
id = "workflow-0003"
path = ".github/workflows/policy-contracts.yml"
permissions = "contents: read"
actions = [
  "actions/checkout@v6",
]
reason = "Path-scoped source-of-truth scaffold workflow. It validates document, goal, package-boundary, and CI-lane ledgers when policy/spec/status/workflow/xtask rails change, without publishing, witness execution, source edits, or policy blocking."
created = "2026-05-20"
review_after = "2026-07-01"

[[workflow]]
id = "workflow-0004"
path = ".github/workflows/editor-extension.yml"
permissions = "contents: read"
actions = [
  "actions/checkout@v6",
  "actions/setup-node@v6",
  "actions/upload-artifact@v7",
]
reason = "Path-scoped editor extension packaging workflow. It installs npm dependencies, compiles TypeScript, runs unit tests, packages a VSIX for the read-only saved-lsp viewer, and uploads it as an artifact only for editor workflow/code changes, without publishing, witness execution, source edits, comment posting, or write permissions."
created = "2026-05-23"
review_after = "2026-07-23"

[[workflow]]
id = "workflow-0005"
path = ".github/workflows/editor-publish.yml"
permissions = "contents: read"
actions = [
  "actions/checkout@v6",
  "actions/setup-node@v6",
  "actions/upload-artifact@v7",
]
reason = "Manual editor extension publish workflow. workflow_dispatch only from main with dry_run default true; non-dry-run requires at least one explicit publish target and validated package identity; publication to VS Marketplace requires VSCE_PAT secret and explicit publish_to_vs_marketplace=true, publication to Open VSX requires OVSX_PAT secret and explicit publish_to_open_vsx=true. No witness execution, no source edits, no comment posting, no automatic publication on PR or push."
created = "2026-05-23"
review_after = "2026-07-23"

[[workflow]]
id = "workflow-0006"
path = ".github/workflows/coverage.yml"
permissions = "contents: read"
actions = [
  "actions/checkout@v6",
  "dtolnay/rust-toolchain@1.95.0",
  "Swatinem/rust-cache@v2",
  "codecov/codecov-action@v6",
  "actions/upload-artifact@v7",
]
reason = "Advisory cargo-llvm-cov + Codecov telemetry workflow, routed to the EM shared self-hosted 16 GB Rust tier on trusted push(main)/dispatch refs only. It uploads LCOV as execution-surface telemetry without threshold gating, without PR comment posting, without witness execution, without default branch-protection blocking, and without claiming memory safety, UB-free status, Miri-clean status, or site-execution proof."
created = "2026-05-23"
review_after = "2026-08-23"

[[workflow]]
id = "workflow-0007"
path = ".github/workflows/droid-pr-review.yml"
permissions = "contents: read, id-token: write, pull-requests: write"
actions = [
  "actions/checkout@v6",
  "Factory-AI/droid-action@8ea31f351ee6636ebef918ccb64682f477af7184",
]
reason = "Owner-requested advisory Droid PR review bot. It configures Factory BYOK with MiniMax M3 via the Anthropic-compatible MiniMax endpoint, uses Droid's shallow review preset with low reasoning effort, disables Droid security review blocking, passes the scoped workflow GitHub token to Droid, grants id-token: write for the pinned Factory Droid validator OIDC path, runs only on non-draft pull requests, bounds the Droid action step with a timeout and continue-on-error so review-bot failures stay advisory, cancels superseded PR review runs per PR, clears ambient Anthropic globals, posts advisory review/security comments through Factory, and does not run unsafe-review witnesses, edit source, publish artifacts, or make unsafe-correctness claims."
created = "2026-06-01"
review_after = "2026-07-01"
