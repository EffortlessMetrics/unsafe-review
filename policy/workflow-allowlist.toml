[[workflow]]
id = "workflow-0002"
path = ".github/workflows/unsafe-review.yml"
permissions = "contents: read"
actions = [
  "actions/checkout@v6",
  "dtolnay/rust-toolchain@1.95.0",
  "actions/upload-artifact@v7",
]
reason = "Advisory unsafe-review first-pr packet workflow. It uploads cards.json, pr-summary.md, cards.sarif, comment-plan.json, witness-plan.md, and lsp.json without witness execution, comment posting, source edits, or write permissions."
created = "2026-05-18"
review_after = "2026-06-18"

[[workflow]]
