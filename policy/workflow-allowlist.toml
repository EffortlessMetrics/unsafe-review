  "actions/checkout@v6",
  "dtolnay/rust-toolchain@1.95.0",
  "dtolnay/rust-toolchain@v1",
]
reason = "Routed Rust Small workflow with CPX42/CX43/CX53/GitHub-hosted lanes and normalized result validation."
