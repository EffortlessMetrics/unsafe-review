schema_version = "0.1"
policy = "workflow-allowlist"
owner = "core/ci"

[[workflow]]
id = "workflow-0001"
path = ".github/workflows/ci.yml"
permissions = "contents: read"
actions = [
  "actions/checkout@v6",
  "dtolnay/rust-toolchain@1.95.0",
]
reason = "Primary Rust compile, lint, test, and source-of-truth validation workflow."
created = "2026-05-18"
review_after = "2026-06-18"

[[workflow]]
id = "workflow-0002"
path = ".github/workflows/unsafe-review.yml"
permissions = "contents: read"
actions = [
  "actions/checkout@v6",
  "dtolnay/rust-toolchain@1.95.0",
  "actions/upload-artifact@v7",
]
reason = "Advisory unsafe-review PR artifact workflow. It uploads cards.json, pr-summary.md, cards.sarif, and comment-plan.json without witness execution or write permissions."
created = "2026-05-18"
review_after = "2026-06-18"
