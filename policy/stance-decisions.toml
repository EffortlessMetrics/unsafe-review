[[stance]]
id = "unsafe-sites-pre-cap-count"
summary = "summary.unsafe_sites is the real pre-max_cards-cap site count, not the capped card count."
rationale = """
When a scan is capped by max_cards, the cards slice is truncated but
summary.unsafe_sites must reflect the true number of distinct unsafe sites found
before the cap was applied. Reporting the capped count would silently undercount
scope and mislead consumers about the real unsafe surface. This stance rejects
post-cap counts in summary.unsafe_sites; it does not assert that the pre-cap
count is a complete enumeration of all unsafe code in the repository.
"""
owner = "core / analysis"
linked_spec = "UNSAFE-REVIEW-SPEC-0014"
linked_tests = [
  "unsafe_review_core::analysis::pipeline::tests::summary_unsafe_sites_counts_pre_cap_sites_distinct_from_cards",
]
review_after = "2026-12-15"
