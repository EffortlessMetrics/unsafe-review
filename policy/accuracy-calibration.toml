schema_version = "1.0"
status = "experimental"

trust_boundary = """
Accuracy calibration describes ReviewCard evidence quality for scoped static
unsafe exposure analysis. It is not a proof of memory safety, not UB-free status,
not Miri-clean status, and not policy readiness unless a separate policy spec
promotes it.
"""

[claim_levels]
fixture_pinned = "Fixture/golden-backed behavior only."
dogfood_measured = "Measured on selected real repositories or PR diffs; no rate claim."
labeled_calibrated = "Measured on an adjudicated labeled corpus with denominator."
policy_eligible = "Labeled-calibrated plus stability, drift, and support-tier review."

[kinds]
allowed = [
  "inventory",
  "operation_family",
  "hazard",
  "obligation",
  "evidence_precision",
  "false_positive_control",
  "false_negative_probe",
  "route_quality",
  "identity_stability",
  "artifact_honesty",
]

