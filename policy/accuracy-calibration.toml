schema_version = "1.0"
status = "experimental"

trust_boundary = """
Accuracy calibration describes ReviewCard evidence quality for scoped static
unsafe exposure analysis. It is not a proof of memory safety, not UB-free status,
not Miri-clean status, and not policy readiness unless a separate policy spec
promotes it.
"""

[claim_levels]
fixture_pinned = "Fixture/golden-backed behavior only."
dogfood_measured = "Measured on selected real repositories or PR diffs; no rate claim."
labeled_calibrated = "Measured on an adjudicated labeled corpus with denominator."
policy_eligible = "Labeled-calibrated plus stability, drift, and support-tier review."

[kinds]
allowed = [
  "inventory",
  "operation_family",
  "hazard",
  "obligation",
  "evidence_precision",
  "false_positive_control",
  "false_negative_probe",
  "route_quality",
  "identity_stability",
  "artifact_honesty",
]

[[claim]]
id = "raw-pointer-read-alignment-evidence"
status = "fixture_pinned"
kind = "evidence_precision"
owner = "calibration"
operation_family = "raw_pointer_read"
hazard = "alignment"
support_tier = "Guard evidence mining"
fixtures = [
  "raw_pointer_alignment_is_aligned_guard",
  "raw_pointer_alignment_observed_not_guard",
  "raw_pointer_alignment_closed_branch_not_guard",
  "raw_pointer_alignment_reassigned_pointer_not_guard",
  "raw_pointer_alignment_modulo_guard",
  "raw_pointer_alignment_modulo_observed_not_guard",
  "raw_pointer_alignment_modulo_closed_branch_not_guard",
  "raw_pointer_alignment_modulo_reassigned_pointer_not_guard",
]
dogfood_targets = []
label_ledgers = [
  "docs/accuracy/labels/raw-pointer-read-alignment.toml",
]
labeled_reports = []
allowed_public_claim = """
Fixture-pinned alignment guard evidence for raw pointer reads rejects observed,
closed-branch, stale-pointer, and wrong-shape evidence in the listed fixtures.
"""
forbidden_claims = [
  "broad raw pointer safety",
  "global precision",
  "global recall",
  "memory-safety proof",
]

