schema_version = "1.0"
policy = "unsafe-review-pr-corpus"
status = "active"
owner = "repo-infra"

# Trust boundary: this ledger records expected outcome_movement counts and
# comment-plan selection counts for synthetic movement fixtures. It does NOT
# constitute a memory-safety proof, UB-free claim, Miri-clean claim,
# site-execution result, or calibrated precision/recall measurement. All
# findings are advisory. The expected counts are deterministic (integer counts
# over pinned fixture inputs); they do not assert that real PR behavior matches
# any particular precision or recall threshold.

# Real external PR diffs are deferred to a later nightly/release lane.
# This ledger covers SYNTHETIC movement fixtures only (deterministic,
# checked into the repository, safe to run on every PR).

# Schema: each [[pr]] entry declares:
#   id           — unique case identifier (lowercase, hyphen-separated)
#   kind         — "synthetic-fixture" (pinned, deterministic, in-repo)
#   root         — path to the fixture root, relative to workspace root
#   diff         — diff filename, relative to root
#   no_new_debt_exit_code — expected exit code when --policy no-new-debt is passed
#   [pr.expected]
#     new_gaps        — expected summary.new_gaps count
#     worsened_gaps   — expected summary.worsened_gaps count
#     improved_gaps   — expected summary.improved_gaps count
#     resolved_gaps   — expected summary.resolved_gaps count
#     inherited_gaps  — expected summary.inherited_gaps count
#     selected_count     — expected comment-plan summary.selected_count
#     not_selected_count — expected comment-plan summary.not_selected_count

# Movement counts observed by running:
#   cargo run --locked -p unsafe-review -- check \
#     --root fixtures/<fx> --diff fixtures/<fx>/change.diff --format json
# Comment-plan counts observed via:
#   cargo run --locked -p unsafe-review -- first-pr \
#     --root fixtures/<fx> --diff fixtures/<fx>/change.diff --out-dir <tmpdir>
# All counts verified on 2026-06-15 (worktree agent-a6383bcd16c4ed7fa).

[[pr]]
id = "brownfield-inherited"
kind = "synthetic-fixture"
root = "fixtures/raw_pointer_deref_brownfield_inherited"
diff = "change.diff"
# no-new-debt passes because no new gap was introduced.
no_new_debt_exit_code = 0

[pr.expected]
# Advisory run: baseline card is pre-existing; the PR adds nothing new.
# inherited_gaps=1 because the baseline card is carried forward unchanged.
new_gaps = 0
worsened_gaps = 0
improved_gaps = 0
resolved_gaps = 0
inherited_gaps = 1
# Comment-plan: inherited (baseline_known) cards are not actionable;
# they must NOT be selected for inline PR comments.
selected_count = 0
not_selected_count = 1

[[pr]]
id = "baseline-resolved"
kind = "synthetic-fixture"
root = "fixtures/raw_pointer_deref_resolved"
diff = "change.diff"
# no-new-debt passes because no new gap was introduced (the existing one resolved).
no_new_debt_exit_code = 0

[pr.expected]
# Advisory run: PR adds a # Safety contract, removing the baseline card.
# resolved_gaps=1; no cards remain after the PR.
new_gaps = 0
worsened_gaps = 0
improved_gaps = 0
resolved_gaps = 1
inherited_gaps = 0
# Comment-plan: no cards in the post-PR output; both counts are 0.
selected_count = 0
not_selected_count = 0

[[pr]]
id = "coverage-improved"
kind = "synthetic-fixture"
root = "fixtures/raw_pointer_deref_coverage_improved"
diff = "change.diff"
# no-new-debt passes because no new gap was introduced.
no_new_debt_exit_code = 0

[pr.expected]
# Advisory run: PR adds a # Safety contract; the baseline card remains but
# its contract_coverage improved from missing → present.
# improved_gaps=1, inherited_gaps=1 (card still open as baseline_known).
new_gaps = 0
worsened_gaps = 0
improved_gaps = 1
resolved_gaps = 0
inherited_gaps = 1
# Comment-plan: baseline_known card is not actionable → not selected.
selected_count = 0
not_selected_count = 1

[[pr]]
id = "coverage-worsened"
kind = "synthetic-fixture"
root = "fixtures/raw_pointer_deref_coverage_worsened"
diff = "change.diff"
# no-new-debt exits 1 because worsened coverage is treated as a policy signal.
no_new_debt_exit_code = 1

[pr.expected]
# Advisory run: PR removes the # Safety contract; the baseline card
# regresses from contract_coverage=present → missing.
# worsened_gaps=1, inherited_gaps=1 (card still baseline_known).
new_gaps = 0
worsened_gaps = 1
improved_gaps = 0
resolved_gaps = 0
inherited_gaps = 1
# Comment-plan: baseline_known (worsened) card is not actionable → not selected.
selected_count = 0
not_selected_count = 1
