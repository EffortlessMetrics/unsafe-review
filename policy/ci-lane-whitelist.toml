schema_version = "1.0"

[[lane]]
id = "default-workspace"
owner = "repo-infra"
intent = "Protect the Rust workspace with one tight CI gate, self-hosted primary via a minimal capacity router with GitHub-hosted overflow: the deterministic xtask check-pr core floor as the only hard blocker, with advisory ub-review LLM review riding along in the same job"
proof_obligation = "the deterministic core gate cargo run --locked -p xtask -- check-pr passes without witnesses, publishing, source edits, or comment posting, and its verdict is the only thing that gates the merge through the single required Unsafe Review Rust Result check; a minimal route job (not a required check) sends the gate to an idle trusted self-hosted em-ci runner when the owned fleet has capacity and overflows to ubuntu-latest otherwise (bursts, capacity gaps, missing runner-read token, org-runner API failure, or fork PRs), with no per-size self-hosted routing and no separate normalized fallback required check"
cost_estimate = "medium"
trigger_policy = "pull_request, push(main), merge_group, workflow_dispatch"
status = "required"
review_after = "2026-07-18"

[[lane]]
id = "ub-review-advisory"
owner = "repo-infra / ci"
intent = "Run advisory ub-review intelligent-ci LLM review on top of the deterministic core gate, in the same single CI job"
proof_obligation = "the EffortlessMetrics/ub-review action (structured-ingestion: ingests unsafe-review-gate.json by schema — routes by schema, no markdown scraping — and posts inline path:line review comments) posts a grouped advisory PR review and emits its gate manifest while staying advisory (continue-on-error, fail-on-gate false, posting review) so it never fails the merge; it reuses the warmed toolchain and cache (setup-rust false), consumes the deterministic core precontext via pr-thread-context, uses MiniMax-M3 as primary with OpenCode deepseek-v4-flash as fallback under provider-policy primary-with-fallback, is skipped on fork PRs that cannot read org secrets, and runs no witnesses, source edits, or publishing"
cost_estimate = "medium"
trigger_policy = "pull_request (non-fork), in the same job as the default-workspace core gate"
status = "advisory"
review_after = "2026-07-18"

[[lane]]
id = "policy-contracts"
owner = "repo-infra"
intent = "Validate source-of-truth ledgers and links"
proof_obligation = "doc artifacts, docs automation, active goals, package boundary, CI lane ledger, and policy bundle parse and resolve"
cost_estimate = "low"
trigger_policy = "pull_request(paths: policy/**, .unsafe-review-spec/**, docs/specs/**, docs/status/**, .github/workflows/**, xtask/**), push(main), workflow_dispatch"
status = "advisory"
review_after = "2026-07-01"

[[lane]]
id = "advisory-first-pr"
owner = "repo-infra / ci"
intent = "Render and verify advisory unsafe-review PR packets without blocking on findings"
proof_obligation = "first-pr artifacts parse, align across projections, preserve trust boundary, and remain plan-only/read-only"
cost_estimate = "medium"
trigger_policy = "pull_request, workflow_dispatch"
status = "advisory"
review_after = "2026-07-01"

[[lane]]
id = "source-divergence"
owner = "repo-infra"
intent = "Report source/swarm drift before routine swarm implementation"
proof_obligation = "source-divergence reports source-only and swarm-only commit counts"
cost_estimate = "low"
trigger_policy = "local preflight, workflow_dispatch if promoted"
status = "advisory"
review_after = "2026-07-01"

[[lane]]
id = "coverage"
owner = "repo-infra / coverage"
intent = "Publish Rust test execution-surface telemetry"
proof_obligation = "LCOV is generated by cargo-llvm-cov and uploaded to Codecov as advisory telemetry without threshold gating, PR comment posting, release-readiness gating, witness execution, or unsafe-correctness claims; Codecov upload failures do not fail the lane and the lane is not a required branch-protection gate"
cost_estimate = "medium"
trigger_policy = "push(main), workflow_dispatch; pull_request disabled during swarm CI budget window"
status = "advisory"
review_after = "2026-08-23"

[[lane]]
id = "release-readiness"
owner = "release"
intent = "Run package, dry-run publish, install, first-pr, and support smoke proof before publication"
proof_obligation = "release proof commands pass without publishing unless a trusted release workflow is separately specified"
cost_estimate = "high"
trigger_policy = "workflow_dispatch or release-prep branch only after lane promotion"
status = "deferred"
review_after = "2026-07-01"

[[lane]]
id = "trusted-comment-poster"
owner = "repo-infra / ci"
intent = "Post or update PR comments from a verified comment-plan artifact"
proof_obligation = "trusted workflow verifies comment-plan without rerunning untrusted analysis before using pull-requests write"
cost_estimate = "medium"
trigger_policy = "workflow_run or explicit trusted dispatch only after design acceptance"
status = "deferred"
review_after = "2026-07-01"

[[lane]]
id = "editor-extension-packaging"
owner = "editor/extension"
intent = "Compile, test, and package the read-only saved-lsp viewer extension as a VSIX without publishing"
proof_obligation = "npm install, TypeScript compile, unit tests, and vsce package succeed and produce a VSIX artifact without witness execution, source edits, comment posting, marketplace publication, or write permissions"
cost_estimate = "low"
trigger_policy = "pull_request(paths: editors/vscode/**, .github/workflows/editor-extension.yml), push(main; paths: editors/vscode/**, .github/workflows/editor-extension.yml), workflow_dispatch"
status = "advisory"
review_after = "2026-07-23"

[[lane]]
id = "editor-extension-publish"
owner = "editor/extension"
intent = "Manually publish the editor extension to VS Marketplace and Open VSX from explicit owner dispatch only"
proof_obligation = "workflow runs only on workflow_dispatch from main, refuses to publish unless dry_run=false plus an explicit publish boolean is set, requires VSCE_PAT or OVSX_PAT secrets for the matching publication path, validates package identity, and never publishes on PR or push events"
cost_estimate = "low"
trigger_policy = "workflow_dispatch only with dry_run default true"
status = "deferred"
review_after = "2026-07-23"

[[lane]]
id = "droid-pr-review"
owner = "repo-infra / review-bot"
intent = "Run an owner-requested Factory Droid advisory PR review using the MiniMax M3 BYOK custom model"
proof_obligation = "workflow configures ~/.factory/settings.json with MiniMax-M3, uses the deterministic custom:MiniMax-M3-0 model for review and security review, keeps the advisory review on the shallow preset with low reasoning effort, disables Droid security review blocking, passes the scoped workflow GitHub token to Droid, grants id-token: write for the pinned Factory Droid validator OIDC path, clears ambient Anthropic globals, uses only contents: read, pull-requests: write, and id-token: write repository permissions, bounds the Droid action step with a timeout and continue-on-error, cancels superseded PR review runs, and remains advisory without source edits, witness execution, publishing, or unsafe-review blocking claims"
cost_estimate = "medium"
trigger_policy = "pull_request(opened, synchronize, reopened, ready_for_review) for non-draft PRs"
status = "advisory"
review_after = "2026-07-01"
