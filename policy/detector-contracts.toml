schema_version = "1.0"
policy = "detector-contracts"
owner = "core / analysis"
status = "partial"

# Detector-discipline contract ledger. Schema defined in
# UNSAFE-REVIEW-SPEC-0040. Each [[contract]] entry declares which D1-D5
# discipline obligations (UNSAFE-REVIEW-SPEC-0005 appendix) a detector requires,
# plus its positive/negative control fixtures and projecting surfaces. The
# validating gate (check-detector-contracts) is informational in this phase;
# findings print but do not fail the gate. Enforcement for registered families
# flips on once negative controls are confirmed for every entry.

[[contract]]
operation_family = "get_unchecked"
obligations = ["D1", "D2", "D3", "D4", "D5"]
positive_fixtures = [
  "get_unchecked_mut_bounds",
  "get_unchecked_mut_len_guard",
  "get_unchecked_mut_conjunct_len_guard",
  "get_unchecked_mut_get_probe_guard",
]
negative_fixtures = [
  "get_unchecked_mut_other_len_not_guard",
  "get_unchecked_mut_post_check_not_guard",
  "get_unchecked_mut_disjunct_len_not_guard",
  "get_unchecked_mut_bounds_observed_not_guard",
]
surfaces = ["json", "sarif", "human", "agent"]
evidence = "Fixture suite exercises bounds-guard and len-guard discharge paths (positive); unrelated-len, post-check, disjunctive, and observed-only patterns confirm non-discharge (negative). Advisory heuristic only."
review_after = "2026-12-15"

