]
surfaces = ["json", "sarif", "human", "agent"]
evidence = "Slice-range guard discharge confirmed positive; closed-branch, unrelated-len, reassigned-count, and shadowed-src negative controls confirm discipline gates. Advisory heuristic only."
review_after = "2026-12-15"

