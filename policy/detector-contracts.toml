positive_fixtures = [
  "zeroed_invalid_value",
  "zeroed_valid_u32",
  "zeroed_call_still_cards",
]
negative_fixtures = []
proof_gap = "no negative-control fixture for zeroed family; follow-up needed to add _not_guard controls covering safe-context (D1), definition header (D2), unrelated-origin (D3), comment masking (D4), and path-segment (D5) discipline checks"
surfaces = ["json", "sarif", "human", "agent"]
evidence = "Positive fixtures confirm invalid-value and valid-type detection. No negative-control fixtures exist for this family; advisory posture unchanged. Follow-up required before enforcement gate activates."
review_after = "2026-09-15"

