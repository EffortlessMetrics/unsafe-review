  "multiline_unsafe_fn_call_wrapper",
  "unsafe_fn_call_encode_utf8_remaining_cap",
  "unchecked_constructor_availability_guard",
]
negative_fixtures = [
  "ffi_same_named_method_not_route",
  "unchecked_constructor_other_availability_not_guard",
  "ffi_non_libc_wrapper_call_not_route",
  "ffi_local_libc_module_call_not_route",
]
surfaces = ["json", "sarif", "human", "agent"]
evidence = "Wrapper and constructor availability discharge paths confirmed positive; same-named-method, unrelated-availability, and module-scope routing negative controls confirm discipline gates. Note: the ffi_*_not_route negatives are calibrated as unsafe_fn_call, which is the correct family for these non-FFI-routed calls. Advisory heuristic only."
review_after = "2026-12-15"

[[contract]]
operation_family = "ffi"
obligations = ["D1", "D2", "D3", "D4", "D5"]
positive_fixtures = [
  "ffi_sanitizer_route",
  "ffi_missing_boundary_contract",
  "ffi_call_sanitizer_route",
  "ffi_qualified_call_sanitizer_route",
]
negative_fixtures = []
proof_gap = "no negative-control fixture is calibrated under the ffi operation_family; the existing not-route fixtures (ffi_same_named_method_not_route, ffi_non_libc_wrapper_call_not_route, ffi_local_libc_module_call_not_route, ffi_inner_libc_path_not_route, ffi_token_in_string_not_route) are all calibrated as unsafe_fn_call, not ffi, because routing does not occur for those patterns; follow-up needed to add dedicated ffi negative-control fixtures"
surfaces = ["json", "sarif", "human", "agent"]
evidence = "Sanitizer-route and missing-boundary-contract discharge paths confirmed positive. Negative controls are absent for the ffi family specifically; not-route fixtures fall under unsafe_fn_call in calibration. Advisory posture unchanged."
review_after = "2026-09-15"

