name: unsafe-review-first-pr-example

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  first_pr_bundle:
    name: unsafe-review first-pr bundle
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@1.95.0

      - name: Build unsafe-review
        run: cargo build --locked -p unsafe-review

      - name: Render first-pr advisory bundle
        env:
          BASE_REF: ${{ github.base_ref || github.event.repository.default_branch }}
        run: |
          mkdir -p target/unsafe-review
          ./target/debug/unsafe-review first-pr --base "origin/${BASE_REF}" --out-dir target/unsafe-review

      - name: Verify first-pr artifact contract
        run: cargo run --locked -p xtask -- check-first-pr-artifacts target/unsafe-review

      - name: Write GitHub summary
        run: |
          {
            echo "## unsafe-review first-pr summary"
            echo
            cat target/unsafe-review/pr-summary.md
            echo
            echo "> Trust boundary: advisory unsafe seam review; findings are not safety proof."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload first-pr artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: unsafe-review-first-pr
          path: |
            target/unsafe-review/cards.json
            target/unsafe-review/pr-summary.md
            target/unsafe-review/cards.sarif
            target/unsafe-review/comment-plan.json
            target/unsafe-review/witness-plan.md
            target/unsafe-review/lsp.json
          if-no-files-found: error
