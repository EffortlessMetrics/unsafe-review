# Drop-in PR workflow for unsafe-review.
#
# Copy this file to your repository at:
#   .github/workflows/unsafe-review-first-pr.yml
#
# The workflow installs the published unsafe-review CLI from crates.io,
# renders the advisory first-pr bundle against the PR base, uploads the
# bundle as an artifact, and writes a bounded job summary fragment.
#
# It does NOT:
#   - request write tokens
#   - post PR comments
#   - run Miri, cargo-careful, sanitizers, Loom, Shuttle, Kani, or Crux
#   - edit source files
#   - block on unsafe-review findings
#   - claim memory safety, UB-free status, Miri-clean status, or site-execution proof
#
# See docs/ci/github-actions.md in the unsafe-review repository for the full
# user-facing guide.

name: unsafe-review-first-pr-example

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: unsafe-review-first-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  first_pr_bundle:
    name: unsafe-review advisory packet
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      UNSAFE_REVIEW_VERSION: "0.2.1"
      BASE_REF: ${{ github.base_ref || github.event.repository.default_branch }}
      BUNDLE_DIR: target/unsafe-review
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 100
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@1.95.0

      - name: Fetch base ref
        run: git fetch --no-tags --depth=100 origin "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}"

      - name: Install unsafe-review from crates.io
        run: cargo install unsafe-review --locked --version "${UNSAFE_REVIEW_VERSION}"

      - name: Render first-pr advisory bundle
        run: |
          mkdir -p "${BUNDLE_DIR}"
          unsafe-review first-pr \
            --base "origin/${BASE_REF}" \
            --out-dir "${BUNDLE_DIR}"

      - name: Verify bundle file shape
        run: |
          set -euo pipefail
          for required in \
            cards.json \
            pr-summary.md \
            github-summary.md \
            cards.sarif \
            comment-plan.json \
            witness-plan.md \
            manual-candidates.json \
            manual-repair-queue.json \
            tokmd-packets.json \
            lsp.json \
            repair-queue.json
          do
            if [ ! -s "${BUNDLE_DIR}/${required}" ]; then
              echo "::error::unsafe-review bundle is missing ${required}"
              exit 1
            fi
          done

      - name: Write bounded GitHub job summary
        run: cat "${BUNDLE_DIR}/github-summary.md" >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload first-pr artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: unsafe-review-first-pr
          path: |
            target/unsafe-review/review-kit.json
            target/unsafe-review/cards.json
            target/unsafe-review/pr-summary.md
            target/unsafe-review/github-summary.md
            target/unsafe-review/cards.sarif
            target/unsafe-review/comment-plan.json
            target/unsafe-review/witness-plan.md
            target/unsafe-review/receipt-audit.md
            target/unsafe-review/manual-candidates.json
            target/unsafe-review/manual-repair-queue.json
            target/unsafe-review/tokmd-packets.json
            target/unsafe-review/lsp.json
            target/unsafe-review/repair-queue.json
          if-no-files-found: error
