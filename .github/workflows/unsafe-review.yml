name: unsafe-review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, labeled]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: unsafe-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && github.event.action == 'synchronize' }}

jobs:
  advisory:
    name: unsafe-review advisory packet
    # Normal Rust build/render lane. Routed to the EM shared self-hosted
    # rust-small tier; queueing on the shared group is acceptable backpressure.
    # The full-ci label is a maintainer-applied trust gate, so this lane never
    # runs unattended on untrusted fork code. It is advisory, not a required gate.
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.pull_request.draft == false && contains(github.event.pull_request.labels.*.name, 'full-ci')) }}
    runs-on:
      group: em-ci-small
      labels: [self-hosted, linux, x64, em-ci, rust-small, trusted-pr]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 100
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2

      - name: Fetch base ref
        env:
          BASE_REF: ${{ github.base_ref || github.event.repository.default_branch }}
        run: git fetch --no-tags --depth=100 origin "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}"

      - name: Build unsafe-review
        run: cargo build --locked -p unsafe-review

      - name: Render first-pr advisory bundle
        env:
          BASE_REF: ${{ github.base_ref || github.event.repository.default_branch }}
        run: |
          mkdir -p target/unsafe-review
          ./target/debug/unsafe-review first-pr \
            --base "origin/${BASE_REF}" \
            --out-dir target/unsafe-review

      - name: Verify first-pr artifact contract
        run: cargo run --locked -p xtask -- check-first-pr-artifacts target/unsafe-review

      - name: Write GitHub summary
        run: cat target/unsafe-review/github-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload unsafe-review artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: unsafe-review-first-pr
          path: |
            target/unsafe-review/review-kit.json
            target/unsafe-review/cards.json
            target/unsafe-review/pr-summary.md
            target/unsafe-review/github-summary.md
            target/unsafe-review/cards.sarif
            target/unsafe-review/comment-plan.json
            target/unsafe-review/witness-plan.md
            target/unsafe-review/receipt-audit.md
            target/unsafe-review/manual-candidates.json
            target/unsafe-review/manual-repair-queue.json
            target/unsafe-review/lsp.json
            target/unsafe-review/repair-queue.json
          if-no-files-found: error
