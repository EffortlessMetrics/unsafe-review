name: unsafe-review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: unsafe-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && github.event.action == 'synchronize' }}

jobs:
  advisory:
    name: unsafe-review advisory
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@1.95.0

      - name: Build unsafe-review
        run: cargo build --locked -p unsafe-review

      - name: Render unsafe-review artifacts
        env:
          BASE_REF: ${{ github.base_ref || github.event.repository.default_branch }}
        run: |
          ./target/debug/unsafe-review first-pr --base "origin/${BASE_REF}" --out-dir target/unsafe-review

      - name: Verify unsafe-review artifacts
        run: cargo run --locked -p xtask -- check-advisory-artifacts target/unsafe-review

      - name: Upload unsafe-review artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: unsafe-review
          path: |
            target/unsafe-review/review-kit.json
            target/unsafe-review/cards.json
            target/unsafe-review/pr-summary.md
            target/unsafe-review/github-summary.md
            target/unsafe-review/cards.sarif
            target/unsafe-review/comment-plan.json
            target/unsafe-review/witness-plan.md
            target/unsafe-review/receipt-audit.md
            target/unsafe-review/lsp.json
            target/unsafe-review/repair-queue.json
          if-no-files-found: error
