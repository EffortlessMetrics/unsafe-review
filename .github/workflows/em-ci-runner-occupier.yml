name: EM CI Runner Occupier

on:
  workflow_dispatch:
    inputs:
      target:
        description: Runner to occupy
        required: true
        type: choice
        options:
          - cx43
          - cx53
      seconds:
        description: Seconds to occupy the runner
        required: true
        default: "600"

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  occupy-cx43:
    name: Occupy CX43
    if: inputs.target == 'cx43'
    runs-on:
      group: em-ci-small
      labels: [self-hosted, em-ci, cx43, rust-small, trusted-pr]
    timeout-minutes: 35
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Occupy runner
        env:
          OCCUPY_SECONDS: ${{ inputs.seconds }}
        run: |
          set -euo pipefail

          seconds="${OCCUPY_SECONDS:-600}"
          if [[ ! "${seconds}" =~ ^[0-9]+$ ]]; then
            echo "seconds must be a positive integer"
            exit 2
          fi

          if (( seconds < 1 || seconds > 1800 )); then
            echo "seconds must be between 1 and 1800"
            exit 2
          fi

          echo "occupy_target=cx43"
          echo "occupy_seconds=${seconds}"
          hostname
          sleep "${seconds}"

  occupy-cx53:
    name: Occupy CX53
    if: inputs.target == 'cx53'
    runs-on:
      group: em-ci-small
      labels: [self-hosted, em-ci, cx53, rust-small, trusted-pr]
    timeout-minutes: 35
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Occupy runner
        env:
          OCCUPY_SECONDS: ${{ inputs.seconds }}
        run: |
          set -euo pipefail

          seconds="${OCCUPY_SECONDS:-600}"
          if [[ ! "${seconds}" =~ ^[0-9]+$ ]]; then
            echo "seconds must be a positive integer"
            exit 2
          fi

          if (( seconds < 1 || seconds > 1800 )); then
            echo "seconds must be between 1 and 1800"
            exit 2
          fi

          echo "occupy_target=cx53"
          echo "occupy_seconds=${seconds}"
          hostname
          sleep "${seconds}"
