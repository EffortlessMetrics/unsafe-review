name: CI

on:
  pull_request:
  push:
    branches: [main, master]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always

jobs:
  route-rust-small:
    name: Route Rust Small
    runs-on: ubuntu-latest
    outputs:
      router_target: ${{ steps.route.outputs.router_target }}
      router_reason: ${{ steps.route.outputs.router_reason }}
      router_error: ${{ steps.route.outputs.router_error }}
      fallback_allowed: ${{ steps.route.outputs.fallback_allowed }}
      fallback_mode: ${{ steps.route.outputs.fallback_mode }}
    steps:
      - name: Route trusted Rust Small lane
        id: route
        env:
          GH_TOKEN: ${{ secrets.EM_RUNNER_READ_TOKEN }}
          ORG: EffortlessMetrics
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]] && [[ "${{ github.event.pull_request.head.repo.fork }}" == "true" ]]; then
            echo "router_target=github" >> "$GITHUB_OUTPUT"
            echo "router_reason=fork_pr" >> "$GITHUB_OUTPUT"
            echo "router_error=false" >> "$GITHUB_OUTPUT"
            echo "fallback_allowed=true" >> "$GITHUB_OUTPUT"
            echo "fallback_mode=full" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'
          # GitHub-hosted full fallback is the default when self-hosted capacity
          # or the runner token is unavailable. The no-github-fallback label is
          # the explicit budget opt-out that routes to blocked instead.
          if jq -e 'index("no-github-fallback")' <<<"$LABELS" >/dev/null 2>&1; then
            FALLBACK_ALLOWED=false
          else
            FALLBACK_ALLOWED=true
          fi
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "router_reason=runner_token_missing" >> "$GITHUB_OUTPUT"
            echo "router_error=true" >> "$GITHUB_OUTPUT"
            if [[ "$FALLBACK_ALLOWED" == "true" ]]; then
              echo "router_target=github" >> "$GITHUB_OUTPUT"
              echo "fallback_allowed=true" >> "$GITHUB_OUTPUT"
              echo "fallback_mode=full" >> "$GITHUB_OUTPUT"
            else
              echo "router_target=blocked" >> "$GITHUB_OUTPUT"
              echo "fallback_allowed=false" >> "$GITHUB_OUTPUT"
              echo "fallback_mode=none" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi
          set +e
          RESP=$(gh api "orgs/${ORG}/actions/runners?per_page=100" 2>router.err)
          CODE=$?
          set -e
          if [[ $CODE -ne 0 ]]; then
            ERR=$(cat router.err || true)
            REASON="runner_api_failed"
            if [[ "$ERR" == *"401"* ]]; then REASON="runner_token_unauthorized"; fi
            if [[ "$ERR" == *"403"* ]]; then REASON="runner_token_forbidden"; fi
            echo "router_reason=${REASON}" >> "$GITHUB_OUTPUT"
            echo "router_error=true" >> "$GITHUB_OUTPUT"
            if [[ "$FALLBACK_ALLOWED" == "true" ]]; then
              echo "router_target=github" >> "$GITHUB_OUTPUT"
              echo "fallback_allowed=true" >> "$GITHUB_OUTPUT"
              echo "fallback_mode=full" >> "$GITHUB_OUTPUT"
            else
              echo "router_target=blocked" >> "$GITHUB_OUTPUT"
              echo "fallback_allowed=false" >> "$GITHUB_OUTPUT"
              echo "fallback_mode=none" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi
          pick_target() {
            local label_a="$1" label_b="$2" label_c="$3" reason="$4"
            if jq -e --arg a "$label_a" --arg b "$label_b" --arg c "$label_c" '
              [.runners[] | select(.status=="online" and .busy==false)
                | [.labels[].name] as $ls
                | select(($ls | index($a)) and ($ls | index($b)) and ($ls | index($c)) and ($ls | index("trusted-pr")) and ($ls | index("em-ci")))]
              | length > 0' <<<"$RESP" >/dev/null; then
              return 0
            fi
            return 1
          }
          if pick_target cpx42 rust-16gb rust-medium cpx42_idle; then
            echo "router_target=cpx42" >> "$GITHUB_OUTPUT"
            echo "router_reason=cpx42_idle" >> "$GITHUB_OUTPUT"
            echo "router_error=false" >> "$GITHUB_OUTPUT"
          elif pick_target cx43 rust-small trusted-pr cx43_idle; then
            echo "router_target=cx43" >> "$GITHUB_OUTPUT"
            echo "router_reason=cx43_idle" >> "$GITHUB_OUTPUT"
            echo "router_error=false" >> "$GITHUB_OUTPUT"
          elif pick_target cx53 rust-small trusted-pr cx53_idle; then
            echo "router_target=cx53" >> "$GITHUB_OUTPUT"
            echo "router_reason=cx53_idle" >> "$GITHUB_OUTPUT"
            echo "router_error=false" >> "$GITHUB_OUTPUT"
          else
            echo "router_reason=no_idle_runner" >> "$GITHUB_OUTPUT"
            echo "router_error=false" >> "$GITHUB_OUTPUT"
            if [[ "$FALLBACK_ALLOWED" == "true" ]]; then
              echo "router_target=github" >> "$GITHUB_OUTPUT"
              echo "fallback_allowed=true" >> "$GITHUB_OUTPUT"
              echo "fallback_mode=full" >> "$GITHUB_OUTPUT"
            else
              echo "router_target=blocked" >> "$GITHUB_OUTPUT"
              echo "fallback_allowed=false" >> "$GITHUB_OUTPUT"
              echo "fallback_mode=none" >> "$GITHUB_OUTPUT"
            fi
          fi

  rust-small-cpx42:
    name: Rust Small on CPX42
    needs: route-rust-small
    if: needs.route-rust-small.outputs.router_target == 'cpx42'
    runs-on:
      group: em-ci-small
      labels: [self-hosted, linux, x64, em-ci, cpx42, rust-16gb, rust-medium, trusted-pr]
    env:
      CARGO_BUILD_JOBS: "7"
      CARGO_INCREMENTAL: "0"
      TMPDIR: /mnt/ci-scratch/tmp/${{ github.run_id }}-${{ github.run_attempt }}
      CARGO_TARGET_DIR: /mnt/ci-scratch/unsafe-review/${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Prepare CPX42 scratch
        run: |
          set -euo pipefail
          ci-disk-guard /mnt/ci-scratch 45
          ci-disk-guard /mnt/ci-cache 10
          mkdir -p "$TMPDIR" "$CARGO_TARGET_DIR"
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Preflight disk and toolchain
        run: |
          set -euo pipefail
          df -h /mnt/ci-scratch /mnt/ci-cache || true
          rustc --version
          cargo --version
      - name: Run Rust small gate
        run: |
          set -euo pipefail
          cargo run -p xtask -- check-pr
      - name: Cleanup and final stats
        if: always()
        run: |
          set +e
          rm -rf "$TMPDIR" "$CARGO_TARGET_DIR"
          df -h /mnt/ci-scratch /mnt/ci-cache || true

  rust-small-cx43:
    name: Rust Small on CX43
    needs: route-rust-small
    if: needs.route-rust-small.outputs.router_target == 'cx43'
    runs-on:
      group: em-ci-small
      labels: [self-hosted, linux, x64, em-ci, cx43, rust-small, trusted-pr]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run Rust small gate
        run: cargo run --locked -p xtask -- check-pr

  rust-small-cx53:
    name: Rust Small on CX53
    needs: route-rust-small
    if: needs.route-rust-small.outputs.router_target == 'cx53'
    runs-on:
      group: em-ci-small
      labels: [self-hosted, linux, x64, em-ci, cx53, rust-small, trusted-pr]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run Rust small gate
        run: cargo run --locked -p xtask -- check-pr

  rust-small-github:
    name: Rust Small Fallback on GitHub Hosted
    needs: route-rust-small
    if: needs.route-rust-small.outputs.router_target == 'github' && needs.route-rust-small.outputs.fallback_allowed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run full fallback gate
        run: cargo run --locked -p xtask -- check-pr

  rust-small-blocked:
    name: Rust Small Blocked (capacity/config)
    needs: route-rust-small
    if: needs.route-rust-small.outputs.router_target == 'blocked'
    runs-on: ubuntu-latest
    steps:
      - name: Explain blocked route
        run: |
          echo "Route blocked with reason: ${{ needs.route-rust-small.outputs.router_reason }}"
          echo "The no-github-fallback label is set, so the default full"
          echo "GitHub-hosted fallback was suppressed for this pull request."
          echo "Remove the no-github-fallback label to run the full gate on"
          echo "GitHub-hosted runners, or restore self-hosted capacity."
          exit 1

  rust-small-result:
    name: Unsafe Review Rust Small Result
    runs-on: ubuntu-latest
    needs: [route-rust-small, rust-small-cpx42, rust-small-cx43, rust-small-cx53, rust-small-github, rust-small-blocked]
    if: always()
    steps:
      - name: Assert selected lane succeeded
        run: |
          set -euo pipefail
          target='${{ needs.route-rust-small.outputs.router_target }}'
          case "$target" in
            cpx42) status='${{ needs.rust-small-cpx42.result }}' ;;
            cx43) status='${{ needs.rust-small-cx43.result }}' ;;
            cx53) status='${{ needs.rust-small-cx53.result }}' ;;
            github) status='${{ needs.rust-small-github.result }}' ;;
            blocked) status='${{ needs.rust-small-blocked.result }}' ;;
            *) echo "unknown target: $target"; exit 1 ;;
          esac
          echo "router_target=$target"
          echo "router_reason=${{ needs.route-rust-small.outputs.router_reason }}"
          echo "router_error=${{ needs.route-rust-small.outputs.router_error }}"
          test "$status" = "success"

  rust-required-result-compat:
    name: Unsafe Review Rust Result
    runs-on: ubuntu-latest
    needs: [rust-small-result]
    if: always()
    steps:
      - name: Mirror routed Rust result for branch protection
        run: |
          set -euo pipefail
          echo "rust_small_result=${{ needs.rust-small-result.result }}"
          test "${{ needs.rust-small-result.result }}" = "success"
