name: CI

# One tight CI gate, single required check, self-hosted-primary with
# GitHub-hosted overflow. A minimal `route` job (NOT a required check) decides
# the gate runner: if a trusted idle self-hosted runner from the EM `em-ci`
# fleet is available it absorbs the run; otherwise (no idle capacity, missing
# runner-read token, org-runner API failure, or a fork PR) the gate overflows to
# zero-config `ubuntu-latest`. The owned fleet handles the bulk; gh-hosted is the
# burst/capacity-gap/fork fallback. There is exactly ONE required status check
# (`Unsafe Review Rust Result`); the router never blocks the merge and there is
# no per-size routing (whatever idle trusted self-hosted runner catches it).
#
# The gate job itself is unchanged in shape: the deterministic core floor
# (`xtask check-pr` plus the full suite) is the only hard blocker; ub-review
# rides along in the SAME job as an advisory LLM layer. The LLM investigation
# window (lanes analysing the diff, model calls) is the long pole and leaves the
# runner CPU idle, so the full deterministic core gate runs concurrently and
# tucks under that latency for free:
#
#   0. route (advisory, ubuntu-latest): pick self-hosted (idle trusted em-ci
#      runner) else ubuntu-latest overflow; emit a runs-on value + runner_kind.
#   1. Shared setup once (checkout fetch-depth 0, toolchain 1.95.0, rust-cache).
#   2. Fast precontext (~seconds, no full build): a runner-kind-aware disk/scratch
#      check, then cargo fmt --check plus repo/PR facts written to
#      target/ci-core/precontext.md, AND the deterministic core gate
#      (`xtask check-pr`) launched in the BACKGROUND sharing the workspace target
#      dir. cargo's target-dir lock serialises any concurrent cargo invocation
#      safely (no corruption; worst case a little extra wall-clock), so this
#      avoids doubling disk with a second target dir and works on both runner
#      kinds.
#   3. ub-review (advisory) runs next, concurrent with the backgrounded core gate.
#      It reuses the warmed toolchain/cache (setup-rust:false) and is fed the fast
#      precontext via pr-thread-context.
#   4. Advisory status: emit a concise, actionable note if the advisory lane failed
#      or was skipped, so it reads as "advisory + actionable" rather than a bare X.
#   5. Final assert: wait for the backgrounded core gate, surface its result in the
#      job summary, and fail the job iff its exit code != 0. The single required
#      check reflects ONLY the deterministic core verdict; ub-review never blocks
#      the merge (continue-on-error + fail-on-gate:false).

on:
  pull_request:
  push:
    branches: [main, master]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always

jobs:
  # Minimal capacity router (NOT a required check). It decides where the single
  # gate runs: self-hosted primary when the owned fleet has idle trusted capacity,
  # gh-hosted overflow otherwise. It only reads org runner state and emits a
  # runs-on value; it never gates the merge and never runs the suite.
  route:
    name: Route CI runner
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      # `runner` is a JSON value the gate consumes via fromJSON: either a JSON
      # string ("ubuntu-latest") or a JSON array of self-hosted labels. Both are
      # valid `runs-on` shapes. `runner_kind` lets the gate branch disk/scratch
      # handling (github vs self-hosted).
      runner: ${{ steps.route.outputs.runner }}
      runner_kind: ${{ steps.route.outputs.runner_kind }}
    steps:
      - name: Decide gate runner (self-hosted primary, gh-hosted overflow)
        id: route
        env:
          GH_TOKEN: ${{ secrets.EM_RUNNER_READ_TOKEN }}
        run: |
          set -uo pipefail
          # gh-hosted overflow is emitted as a JSON string; self-hosted as a JSON
          # array of the shared em-ci trust labels. We match the shared group label
          # set only (NOT any per-size label) so whatever idle trusted runner is
          # free catches it.
          GH='"ubuntu-latest"'
          SELF_HOSTED='["self-hosted","linux","x64","em-ci","trusted-pr"]'
          emit() {
            echo "runner=$1" >> "$GITHUB_OUTPUT"
            echo "runner_kind=$2" >> "$GITHUB_OUTPUT"
            echo "route -> $2 ($3)"
          }
          # Fork PRs can never use trusted self-hosted runners (untrusted code, no
          # org secrets): always overflow to gh-hosted.
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.event.pull_request.head.repo.fork }}" == "true" ]]; then
            emit "$GH" github "fork PR -> gh-hosted overflow"
            exit 0
          fi
          # No runner-read token configured: overflow to gh-hosted.
          if [[ -z "${GH_TOKEN:-}" ]]; then
            emit "$GH" github "EM_RUNNER_READ_TOKEN missing -> gh-hosted overflow"
            exit 0
          fi
          set +e
          RESP="$(gh api "orgs/EffortlessMetrics/actions/runners?per_page=100" 2>route.err)"
          CODE=$?
          set -e
          if [[ $CODE -ne 0 ]]; then
            emit "$GH" github "org runner API failed ($(tr -d '\n' <route.err | head -c 120)) -> gh-hosted overflow"
            exit 0
          fi
          # A trusted idle self-hosted runner is online, not busy, and carries the
          # shared em-ci trusted-pr label set. Any idle size qualifies.
          if jq -e '
            [.runners[]
              | select(.status == "online" and .busy == false)
              | [.labels[].name] as $ls
              | select(($ls | index("self-hosted")) and ($ls | index("linux")) and ($ls | index("x64")) and ($ls | index("em-ci")) and ($ls | index("trusted-pr")))]
            | length > 0' <<<"$RESP" >/dev/null 2>&1; then
            emit "$SELF_HOSTED" self-hosted "idle trusted self-hosted runner available"
          else
            emit "$GH" github "no idle trusted self-hosted capacity -> gh-hosted overflow"
          fi

  unsafe-review-rust-result:
    # Single required check. The job conclusion reflects ONLY the mandatory
    # deterministic core gate (final assert step); the advisory ub-review step is
    # continue-on-error and fail-on-gate:false so it can never flip this result.
    # The job name is kept stable for branch protection.
    #
    # runs-on is decided by the router: a self-hosted label array when the owned
    # fleet has idle trusted capacity, else "ubuntu-latest" overflow. fromJSON
    # turns the router's JSON value into either a runs-on string or label array
    # (both valid). The router never blocks the merge; only this gate does.
    name: Unsafe Review Rust Result
    needs: route
    runs-on: ${{ fromJSON(needs.route.outputs.runner) }}
    timeout-minutes: 60
    permissions:
      contents: read
      # Needed only so the advisory ub-review step can post its grouped PR review.
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so ub-review can diff base..head; the core gate is happy with it too.
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # Fast precontext + background launch of the deterministic core gate. The
      # disk/scratch handling is runner-kind aware: on gh-hosted overflow we free
      # the big preinstalled SDKs when headroom is low; on self-hosted we leave the
      # gh-only paths alone (they are not present) and instead report headroom and
      # reuse the shared workspace target dir. The cheap repo/PR facts are written
      # immediately so the LLM lanes start off them; the full deterministic core
      # gate (fmt + clippy + test + check-pr) is launched in the background sharing
      # the workspace target dir (cargo's lock serialises any overlap safely) and
      # its verdict is the only thing that gates the merge.
      - name: Fast precontext and launch core gate
        env:
          RUNNER_KIND: ${{ needs.route.outputs.runner_kind }}
        run: |
          set +e
          mkdir -p target/ci-core
          if [ "${RUNNER_KIND}" = "self-hosted" ]; then
            # Self-hosted primary: do NOT run the gh disk-free (android/dotnet/ghc/
            # CodeQL are not on the fleet). GC stale per-run scratch dirs before
            # reporting headroom; runs cancelled mid-build skip their cleanup step
            # and orphaned dirs accumulate until the disk guard fails closed.
            # Bounded: -mindepth 1 -maxdepth 1 limits to direct children of each
            # scratch root; -mmin +120 protects dirs newer than 2 h (all workflow
            # timeouts are <=60 min); 2>/dev/null || true is non-fatal on missing
            # paths; never touches worktrees, the repo checkout, or paths outside
            # the scratch mount. Mirrors ripr-swarm#1027. Fixes #1519.
            find /mnt/ci-scratch/cargo-home /mnt/ci-scratch/target /mnt/ci-scratch/tmp \
              -mindepth 1 -maxdepth 1 -mmin +120 -print -exec rm -rf {} + 2>/dev/null || true
            echo "self-hosted runner: reporting headroom; shared workspace target dir reused (cargo lock serialises overlap)."
            df -h . || true
            df -h / || true
          else
            # gh-hosted overflow: concurrent builds should extend time, not crash disk.
            df -h /
            avail_gb="$(df --output=avail -BG / | tail -1 | tr -dc '0-9')"
            if [ "${avail_gb:-0}" -lt 12 ]; then
              echo "disk guard: low headroom (${avail_gb}G < 12G); freeing. Safe-to-remove on ubuntu-latest: /usr/local/lib/android /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL. Reclaim with: sudo rm -rf <those paths>."
              sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL 2>/dev/null || true
            fi
          fi
          {
            echo "# Deterministic precontext for ub-review"
            echo
            echo "- core gate (gates the merge; running concurrently): the full"
            echo "  deterministic suite —"
            echo "    cargo fmt --all --check"
            echo "    cargo clippy --workspace --all-targets --locked -- -D warnings"
            echo "    cargo test --workspace --locked"
            echo "    cargo run --locked -p xtask -- check-pr"
            echo "- check-pr covers the repo contract: docs, public badges, policy"
            echo "  bundle, support tiers, fixtures, calibration, dogfood manifest,"
            echo "  manual fuzz harness, and tracked generated artifacts."
            echo "- runner: ${RUNNER_KIND:-github}  event: ${GITHUB_EVENT_NAME}  base: ${GITHUB_BASE_REF:-n/a}  sha: ${GITHUB_SHA}"
          } > target/ci-core/precontext.md
          # Record the wall-clock start for the advisory floor-time signal. This
          # timestamp is consumed by the "Assert core gate verdict" step to compute
          # required_floor_wall_seconds. It is purely advisory and never gates the
          # merge; failures here are non-fatal (|| true).
          date +%s > target/ci-core/gate_start || true
          # Launch the full deterministic core gate in the background, sharing the
          # workspace target dir (cargo's lock serialises any overlap with
          # ub-review's cargo work safely). The && chain short-circuits, so the
          # recorded exit code is the first failing command's, or 0 if all pass.
          (
            cargo fmt --all --check \
              && cargo clippy --workspace --all-targets --locked -- -D warnings \
              && cargo test --workspace --locked \
              && cargo run --locked -p xtask -- check-pr
            echo "$?" > target/ci-core/core_exit
          ) > target/ci-core/core.log 2>&1 &
          echo "launched background core gate (pid $!): fmt + clippy + test + check-pr"
      # ADVISORY LLM layer, in this same job, concurrent with the backgrounded core
      # gate (the CPU-bound build runs under the network-bound LLM latency).
      # setup-rust:false reuses the toolchain installed above. intelligent-ci posts a
      # grouped PR review and emits its gate manifest, but fail-on-gate:false +
      # continue-on-error keep it advisory: it must not fail the merge. The fast
      # precontext is fed via pr-thread-context so the LLM lanes review on top of the
      # deterministic context. MiniMax-M3 primary, OpenCode deepseek-v4-flash fallback.
      # Skipped on fork PRs (no access to org secrets); the core gate still runs for
      # forks. !cancelled() lets the advisory review post even when the core gate fails.
      - name: UB Review (advisory)
        id: ubreview
        if: ${{ !cancelled() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false }}
        continue-on-error: true
        # Pinned to the structured-ingestion commit SHA (immutable) so a re-tag cannot silently
        # change unsafe-review's gate. Bump deliberately; keep the allowlist in sync.
        # SHA 4053bc0df7cd5918f8c6f80ceb3f714a572789d7 — #363 structured gate.json ingestion
        # (routes by schema, no markdown scraping) + #365 inline path:line review comments.
        uses: EffortlessMetrics/ub-review@4053bc0df7cd5918f8c6f80ceb3f714a572789d7
        with:
          preset: bun-ub
          mode: intelligent-ci
          posting: review
          fail-on-gate: false
          setup-rust: false
          tool-bundle: core
          provider-policy: primary-with-fallback
          minimax-api-key: ${{ secrets.MINIMAX_API_KEY }}
          minimax-model: MiniMax-M3
          opencode-api-key: ${{ secrets.OPENCODE }}
          opencode-model: deepseek-v4-flash
          base: origin/${{ github.base_ref }}
          pr-thread-context: target/ci-core/precontext.md
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-summary: true
      # Advisory-failure UX: keep the advisory lane legibly "advisory + actionable".
      # When ub-review fails or is skipped, emit a concise note (what, why, fix) to
      # the job summary instead of a bare red X, so the gate's signal stays trusted.
      - name: UB Review advisory status
        if: ${{ always() }}
        env:
          UB_OUTCOME: ${{ steps.ubreview.outcome }}
        run: |
          set -u
          case "${UB_OUTCOME}" in
            success)
              echo "ub-review advisory lane completed; see the grouped PR review." >> "$GITHUB_STEP_SUMMARY" ;;
            skipped|"")
              echo "ub-review advisory lane skipped (fork PR without org secrets, or non-PR event); deterministic gate verdict stands." >> "$GITHUB_STEP_SUMMARY" ;;
            *)
              echo "ub-review advisory lane failed (${UB_OUTCOME}): check MINIMAX_API_KEY/OPENCODE secrets and provider/model availability (provider-policy primary-with-fallback, MiniMax-M3 primary, deepseek-v4-flash fallback), then re-run. Deterministic gate verdict stands." >> "$GITHUB_STEP_SUMMARY" ;;
          esac
      # Join + final gate assert. Wait for the backgrounded core gate to finish,
      # surface its result in the job summary, and fail the job iff it exited
      # non-zero. The single required check reflects ONLY this deterministic verdict;
      # ub-review's outcome is irrelevant here, so LLM availability or opinion never
      # blocks the merge.
      - name: Assert core gate verdict
        if: ${{ always() }}
        env:
          RUNNER_KIND: ${{ needs.route.outputs.runner_kind }}
        run: |
          set -uo pipefail
          deadline=$((SECONDS + 3000))
          while [ ! -f target/ci-core/core_exit ]; do
            if [ "${SECONDS}" -ge "${deadline}" ]; then
              echo "core gate did not finish within the budget" >&2
              echo "124" > target/ci-core/core_exit
              break
            fi
            sleep 5
          done
          core_exit="$(cat target/ci-core/core_exit)"
          {
            echo "## Deterministic core gate"
            echo
            if [ "${core_exit}" = "0" ]; then
              echo "Result: PASS (xtask check-pr exit 0)"
            else
              echo "Result: FAIL (xtask check-pr exit ${core_exit})"
            fi
            echo
            echo '```'
            tail -n 60 target/ci-core/core.log 2>/dev/null || echo "(no core gate log captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "core_exit=${core_exit}"
          # Advisory floor-time signal: emit wall-time + run context for
          # ub-review's cost receipt (ub-review#336) to compose. This block is
          # wrapped in a subshell with || true so any arithmetic or write failure
          # is STRICTLY non-fatal and cannot change the gate verdict below.
          (
            gate_end="$(date +%s)"
            gate_start="$(cat target/ci-core/gate_start 2>/dev/null || echo "")"
            if [ -n "${gate_start}" ] && [ "${gate_end}" -gt "${gate_start}" ] 2>/dev/null; then
              elapsed=$(( gate_end - gate_start ))
            else
              elapsed="null"
            fi
            fallback_used="false"
            if [ "${RUNNER_KIND:-github}" = "github" ]; then
              fallback_used="true"
            fi
            {
              printf '{"required_floor_wall_seconds":%s,"runner_kind":"%s","fallback_used":%s,"cache_hit_state":"unknown"}\n' \
                "${elapsed}" "${RUNNER_KIND:-github}" "${fallback_used}"
            } > target/ci-core/floor-time.json
            echo "floor-time: required_floor_wall_seconds=${elapsed} runner_kind=${RUNNER_KIND:-github} fallback_used=${fallback_used} cache_hit_state=unknown" \
              >> "$GITHUB_STEP_SUMMARY"
          ) || true
          test "${core_exit}" = "0"
