name: Droid PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: droid-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  droid-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure MiniMax M3 for Droid BYOK
        shell: bash
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          mkdir -p "$HOME/.factory"

          cat > "$HOME/.factory/settings.json" <<JSON
          {
            "customModels": [
              {
                "model": "MiniMax-M3",
                "displayName": "MiniMax-M3",
                "baseUrl": "https://api.minimax.io/anthropic",
                "apiKey": "${MINIMAX_API_KEY}",
                "provider": "anthropic",
                "maxOutputTokens": 64000
              }
            ]
          }
          JSON

      - name: Run Droid Auto Review
        continue-on-error: true
        timeout-minutes: 40
        uses: Factory-AI/droid-action@150e8c231191631016a9563bf5d8388e36382de9
        env:
          ANTHROPIC_AUTH_TOKEN: ""
          ANTHROPIC_BASE_URL: ""
        with:
          factory_api_key: ${{ secrets.FACTORY_API_KEY }}
          github_token: ${{ github.token }}
          automatic_review: true
          review_model: custom:MiniMax-M3-0
          review_depth: shallow
          reasoning_effort: low
          automatic_security_review: true
          security_model: custom:MiniMax-M3-0
          security_block_on_critical: false
          security_block_on_high: false
