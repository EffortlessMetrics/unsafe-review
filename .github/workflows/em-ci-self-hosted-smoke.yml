name: EM CI Self Hosted Smoke

on:
  workflow_dispatch:
    inputs:
      target:
        description: Runner to smoke
        required: true
        type: choice
        options:
          - cx43
          - cx53

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  smoke-cx43:
    name: Smoke CX43
    if: inputs.target == 'cx43'
    runs-on:
      group: em-ci-small
      labels: [self-hosted, em-ci, cx43, rust-small, trusted-pr]
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Report runner state
        run: |
          set -euo pipefail
          hostname
          id
          df -h
          free -h

  smoke-cx53:
    name: Smoke CX53
    if: inputs.target == 'cx53'
    runs-on:
      group: em-ci-small
      labels: [self-hosted, em-ci, cx53, rust-small, trusted-pr]
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Report runner state
        run: |
          set -euo pipefail
          hostname
          id
          df -h
          free -h
